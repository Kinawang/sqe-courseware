<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQE1 Lesson 2: Human Rights Act 1998 — Practice Game</title>
<style>
:root {
    --paper: #f4ecd8;
    --paper-2: #e8dcb8;
    --ink: #2a2620;
    --ink-soft: #5a5246;
    --seal: #8b1a1a;
    --gold: #b8860b;
    --gold-light: #daa520;
    --ok: #2e6b3e;
    --line: #8a7a5c;
    --fs-body: 18px;
    --fs-h1: 24px;
    --fs-h2: 20px;
    --fs-card: 18px;
    --fs-small: 14px;
}
body.fs-lg { --fs-body: 22px; --fs-h1: 28px; --fs-h2: 24px; --fs-card: 22px; --fs-small: 17px; }
body.fs-xl { --fs-body: 26px; --fs-h1: 32px; --fs-h2: 28px; --fs-card: 26px; --fs-small: 20px; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--paper);
    color: var(--ink);
    font-size: var(--fs-body);
    line-height: 1.6;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--paper-2);
    border-bottom: 2px solid var(--line);
    flex-wrap: wrap;
    gap: 8px;
}
.topbar .title {
    font-size: var(--fs-h1);
    font-weight: bold;
    color: var(--ink);
    white-space: nowrap;
}
.topbar .right {
    display: flex;
    align-items: center;
    gap: 8px;
}
.topbar .coins {
    font-size: var(--fs-body);
    font-weight: bold;
    color: var(--gold);
    background: var(--paper);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--gold-light);
}
.topbar .fs-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: var(--fs-small);
    color: var(--ink);
    font-family: Georgia, serif;
}
.topbar .fs-btn:hover { background: var(--paper-2); }

.stars {
    display: flex;
    gap: 2px;
    align-items: center;
}
.stars .star {
    font-size: var(--fs-h2);
    color: var(--ink-soft);
    opacity: 0.3;
}
.stars .star.filled {
    color: var(--gold);
    opacity: 1;
}

.main {
    display: grid;
    grid-template-columns: 200px 1fr 200px;
    gap: 0;
    min-height: calc(100vh - 60px);
}

.sticker-col {
    width: 200px;
    padding: 8px 6px;
    background: var(--paper-2);
    border-right: 1px solid var(--line);
    border-left: 1px solid var(--line);
}
.sticker-col.col-right {
    border-right: none;
    border-left: 1px solid var(--line);
}
.sticker-col .col-label {
    text-align: center;
    font-size: var(--fs-small);
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.sticker-col .sticker-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
}
.sticker-slot {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: var(--paper);
    border: 1px dashed var(--line);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
}
.sticker-slot:hover { background: var(--paper-2); }
.sticker-slot.filled {
    border-style: solid;
    border-color: var(--gold);
    background: var(--paper);
}
.sticker-slot .empty-hint {
    color: var(--ink-soft);
    opacity: 0.4;
    font-size: var(--fs-h2);
}
.sticker-slot .remove-x {
    position: absolute;
    top: -2px;
    right: 2px;
    color: var(--seal);
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    line-height: 1;
    background: var(--paper);
    border-radius: 50%;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.quiz-area {
    padding: 20px 30px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
}
.quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    flex-wrap: wrap;
    gap: 8px;
}
.quiz-header .chapter {
    font-size: var(--fs-small);
    color: var(--seal);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.quiz-header .progress {
    font-size: var(--fs-small);
    color: var(--ink-soft);
}
.quiz-header .nav-btns {
    display: flex;
    gap: 6px;
}
.quiz-header .nav-btns button {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 2px 10px;
    cursor: pointer;
    font-size: var(--fs-small);
    font-family: Georgia, serif;
    color: var(--ink);
}
.quiz-header .nav-btns button:disabled {
    opacity: 0.4;
    cursor: default;
}
.quiz-header .nav-btns button:hover:not(:disabled) {
    background: var(--paper);
}
.bookmark-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: var(--fs-h2);
    color: var(--ink-soft);
    opacity: 0.5;
}
.bookmark-btn.active { color: var(--gold); opacity: 1; }

.question-text {
    font-size: var(--fs-body);
    margin: 16px 0;
    line-height: 1.7;
}
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.option {
    padding: 12px 16px;
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    font-size: var(--fs-body);
    font-family: Georgia, serif;
    color: var(--ink);
    text-align: left;
    transition: all 0.2s;
}
.option:hover { border-color: var(--gold); background: var(--paper-2); }
.option.selected {
    border-color: var(--gold);
    background: var(--paper-2);
}
.option.correct {
    border-color: var(--ok);
    background: #d4edda;
}
.option.wrong {
    border-color: var(--seal);
    background: #f8d7da;
}
.option.disabled { cursor: default; }

.feedback {
    margin: 16px 0;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: var(--fs-body);
    display: none;
}
.feedback.show { display: block; }
.feedback.correct {
    background: #d4edda;
    border: 1px solid var(--ok);
    color: var(--ok);
}
.feedback.wrong {
    background: #f8d7da;
    border: 1px solid var(--seal);
    color: var(--seal);
}
.feedback .principle {
    margin-top: 8px;
    font-size: var(--fs-body);
    color: var(--ink);
}
.feedback .principle-cn {
    margin-top: 6px;
    font-size: var(--fs-small);
    color: var(--ink-soft);
}
.feedback .cite {
    margin-top: 6px;
    font-size: var(--fs-small);
    color: var(--ink-soft);
    font-style: italic;
}

.next-btn {
    background: var(--seal);
    color: var(--paper);
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: var(--fs-body);
    font-family: Georgia, serif;
    cursor: pointer;
    display: none;
}
.next-btn.show { display: inline-block; }
.next-btn:hover { background: #6b1414; }

.review-btn {
    background: var(--gold);
    color: var(--paper);
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: var(--fs-small);
    font-family: Georgia, serif;
    cursor: pointer;
    margin-left: 10px;
}
.review-btn:hover { background: var(--gold-light); }

.shop-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
}
.shop-overlay.show { display: flex; }
.shop-modal {
    background: var(--paper);
    border-radius: 12px;
    padding: 20px;
    max-width: 700px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    border: 2px solid var(--gold);
}
.shop-modal h2 {
    font-size: var(--fs-h1);
    color: var(--ink);
    margin-bottom: 4px;
    text-align: center;
}
.shop-modal .shop-coins {
    text-align: center;
    font-size: var(--fs-body);
    color: var(--gold);
    font-weight: bold;
    margin-bottom: 16px;
}
.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
}
.shop-item {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
}
.shop-item:hover { border-color: var(--gold); }
.shop-item.owned { opacity: 0.5; cursor: default; }
.shop-item.owned::after {
    content: '✓ owned';
    display: block;
    font-size: var(--fs-small);
    color: var(--ok);
    margin-top: 4px;
}
.shop-item .icon { font-size: 36px; }
.shop-item .name { font-size: var(--fs-small); color: var(--ink); margin-top: 4px; }
.shop-item .price { font-size: var(--fs-small); color: var(--gold); font-weight: bold; margin-top: 4px; }
.shop-item button {
    background: var(--seal);
    color: var(--paper);
    border: none;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: var(--fs-small);
    font-family: Georgia, serif;
    margin-top: 6px;
}
.shop-item button:disabled { background: var(--ink-soft); cursor: default; }
.shop-close {
    display: block;
    margin: 16px auto 0;
    background: var(--ink-soft);
    color: var(--paper);
    border: none;
    padding: 8px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: var(--fs-body);
    font-family: Georgia, serif;
}

.placement-banner {
    display: none;
    background: var(--gold);
    color: var(--paper);
    padding: 8px 20px;
    text-align: center;
    font-size: var(--fs-body);
    font-weight: bold;
}
.placement-banner.show { display: block; }
.placement-banner .cancel-btn {
    background: var(--paper);
    color: var(--gold);
    border: none;
    padding: 2px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: var(--fs-small);
    font-family: Georgia, serif;
    margin-left: 12px;
}

@media (max-width: 768px) {
    .main {
        grid-template-columns: 80px 1fr 80px;
    }
    .sticker-col {
        width: 80px;
        padding: 4px 3px;
    }
    .sticker-col .sticker-grid {
        gap: 3px;
    }
    .sticker-slot {
        font-size: 18px;
    }
    .sticker-slot .empty-hint {
        font-size: var(--fs-small);
    }
    .quiz-area {
        padding: 12px 8px;
    }
    .topbar {
        padding: 8px 10px;
    }
    .topbar .title {
        font-size: var(--fs-h2);
    }
    .shop-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="title">⚖ SQE1 · Lesson 2: Human Rights Act 1998</div>
  <div class="stars" id="stars-top"></div>
  <div class="right">
    <div class="coins">💰 <span class="val" id="coins">0</span></div>
    <button class="fs-btn" onclick="changeFS(-1)">A-</button>
    <button class="fs-btn" onclick="changeFS(1)">A+</button>
  </div>
</div>

<div class="placement-banner" id="placement-banner">
  Tap a slot to place your sticker!
  <button class="cancel-btn" onclick="cancelPlacement()">Cancel</button>
</div>

<div class="main">
  <div class="sticker-col col-left" id="col-left">
    <div class="col-label">Left</div>
  </div>

  <div class="quiz-area">
    <div class="quiz-header">
      <div>
        <span class="chapter" id="chapter"></span>
        <span class="progress" id="progress" style="margin-left:12px;"></span>
      </div>
      <div class="nav-btns">
        <button id="prev-btn" onclick="prevQuestion()">← Prev</button>
        <button id="review-btn" class="review-btn" onclick="startReview()" style="display:none;">Review Wrong</button>
        <button id="next-nav-btn" onclick="nextQuestion()">Next →</button>
        <button class="bookmark-btn" id="bookmark-btn" onclick="toggleBookmark()">☆</button>
      </div>
    </div>
    <div class="stars" id="stars-quiz" style="justify-content:center; margin: 4px 0;"></div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
  </div>

  <div class="sticker-col col-right" id="col-right">
    <div class="col-label">Right</div>
  </div>
</div>

<div class="shop-overlay" id="shop-overlay">
  <div class="shop-modal">
    <h2>🏷️ Sticker Shop</h2>
    <div class="shop-coins">💰 Coins: <span id="shop-coins">0</span></div>
    <div class="shop-grid" id="shop-grid"></div>
    <button class="shop-close" onclick="closeShop()">Close</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'sqe-l2-stickers-v1';
const SLOTS_PER_COL = 10;

const DEFAULT_STATE = {
  coins: 0,
  qIndex: 0,
  answered: [],
  wrong: {},
  bookmarked: [],
  stickers: {},
  placementItem: null,
  fsLevel: 0,
  reviewMode: false,
  reviewQueue: []
};

const STICKERS = [
  { id: 'daisy',       name: 'Daisy',           icon: '🌼', price: 50 },
  { id: 'tulip',       name: 'Tulip',           icon: '🌷', price: 50 },
  { id: 'rose',        name: 'Rose',            icon: '🌹', price: 80 },
  { id: 'sunflower',   name: 'Sunflower',       icon: '🌻', price: 80 },
  { id: 'clover',      name: 'Clover',          icon: '🍀', price: 100 },
  { id: 'cactus',      name: 'Cactus',          icon: '🌵', price: 120 },
  { id: 'palm',        name: 'Palm',            icon: '🌴', price: 150 },
  { id: 'fir',         name: 'Fir Tree',        icon: '🌲', price: 150 },
  { id: 'book',        name: 'Law Book',        icon: '📕', price: 100 },
  { id: 'scroll',      name: 'Scroll',          icon: '📜', price: 120 },
  { id: 'trophy',      name: 'Trophy',          icon: '🏆', price: 200 },
  { id: 'medal',       name: 'Medal',           icon: '🎖', price: 200 },
  { id: 'ribbon',      name: 'Ribbon',          icon: '🎗', price: 150 },
  { id: 'star',        name: 'Star',            icon: '⭐', price: 100 },
  { id: 'gem',         name: 'Gem',             icon: '💎', price: 300 },
  { id: 'crown',       name: 'Crown',           icon: '👑', price: 500 },
  { id: 'anchor',      name: 'Anchor',          icon: '⚓', price: 250 },
  { id: 'key',         name: 'Key',             icon: '🔑', price: 180 },
  { id: 'balance',     name: 'Scales',          icon: '⚖', price: 350 },
  { id: 'gavel',       name: 'Gavel',           icon: '🔨', price: 400 }
];

const QUESTIONS = [
  {
    "key": "h2-1",
    "chapter": "Ch 8: Human Rights Act 1998",
    "text": "The Supreme Court has made a declaration that a section of an Act of Parliament is incompatible with human rights. What is Parliament's position regarding the offending section?",
    "options": [
      "Parliament is obliged to repeal the offending section.",
      "Parliament may repeal the offending section.",
      "Parliament may refer the matter back to the Supreme Court.",
      "Parliament may wait for the result of any appeal to the European Court of Human Rights.",
      "Parliament is obliged to compensate the complainant who brought the case."
    ],
    "best": 1,
    "principle": "Parliament is sovereign. A declaration of incompatibility under s.4 HRA 1998 is a statement that the law is incompatible with Convention rights — it does not strike down the legislation. Parliament may choose to repeal or amend the offending section, but it is under no obligation to do so.",
    "cite": "Revise SQE Const. & Admin. Law Ch.8; s.4 HRA 1998",
    "principleCN": "议会主权。s.4 HRA 1998下的不相容声明只是声明法律与人权不相容——不会废除立法。议会可以选择废除或修改相关条款，但没有义务这样做。",
    "citeCN": "Revise SQE 宪法与行政法 第8章; s.4 HRA 1998"
  },
  {
    "key": "h2-2",
    "chapter": "Ch 8: Human Rights Act 1998",
    "text": "A client alleges that his human rights have been violated and wishes to apply to the European Court of Human Rights. What is the correct route of application?",
    "options": [
      "The client's case must be referred to the European Court of Human Rights by the Supreme Court.",
      "The client's case may be referred to the European Court of Human Rights by any UK court or tribunal.",
      "The client must appeal from the final decision of a UK court.",
      "The client may apply to the European Court of Human Rights.",
      "The client's case may be referred to the European Court of Human Rights by the High Court or any higher court."
    ],
    "best": 3,
    "principle": "The UK is a party to the ECHR and must accept the right of victims to complain to the ECtHR directly. There is no route of appeal linking UK courts to the ECtHR. The individual applies directly to the ECtHR after exhausting domestic remedies.",
    "cite": "Revise SQE Const. & Admin. Law Ch.8; ECtHR",
    "principleCN": "英国是ECHR缔约国，必须接受受害者直接向ECtHR投诉的权利。英国法院与ECtHR之间没有上诉途径。个人在穷尽国内救济后可直接向ECtHR申请。",
    "citeCN": "Revise SQE 宪法与行政法 第8章; ECtHR"
  },
  {
    "key": "h2-3",
    "chapter": "Ch 8: Human Rights Act 1998",
    "text": "Section 2 of the Human Rights Act 1998 states that a court or tribunal determining a question under this Act must 'take into account' any judgment of the European Court of Human Rights. How have UK courts interpreted this duty?",
    "options": [
      "A court or tribunal must follow a judgment of the ECtHR.",
      "A court or tribunal may choose to follow a judgment of the ECtHR.",
      "A court or tribunal should normally follow a judgment of the ECtHR.",
      "A court or tribunal must consider a judgment of the ECtHR.",
      "A court or tribunal must not follow a judgment of the ECtHR."
    ],
    "best": 2,
    "principle": "UK courts have interpreted s.2 HRA 1998 to mean that UK courts should normally follow decisions of the ECtHR. While the statutory wording says 'take into account,' courts clarified this means more than merely consider — there is a strong presumption that UK courts will follow ECtHR judgments, though not bound in every case.",
    "cite": "Revise SQE Const. & Admin. Law Ch.8; s.2 HRA 1998",
    "principleCN": "英国法院将s.2 HRA 1998解释为英国法院通常应遵循ECtHR的判决。虽然法定措辞是'考虑'，法院澄清这意味着不仅仅是考虑——有强烈的推定遵循ECtHR判决，但并非在每个案件中都受约束。",
    "citeCN": "Revise SQE 宪法与行政法 第8章; s.2 HRA 1998"
  },
  {
    "key": "h2-4",
    "chapter": "Ch 8: Human Rights Act 1998",
    "text": "Under the HRA 1998 it is unlawful for a public authority to act in a way that is incompatible with a Convention right. A 'victim of the unlawful act' may bring proceedings under s.7. Which of the following best describes the 'victim' test?",
    "options": [
      "A claimant who is aggrieved by the unlawful act.",
      "A claimant who wishes to stop the unlawful act.",
      "A claimant who has suffered physical harm from the unlawful act.",
      "A claimant who has suffered financial loss from the unlawful act.",
      "A claimant who has been personally affected by the unlawful act."
    ],
    "best": 4,
    "principle": "The term 'victim' in s.7 HRA 1998 adopts the ECtHR definition. A victim is someone who has been personally affected by the unlawful act — they need not have suffered physical harm or financial loss. The test is broader than mere 'aggrievement' but narrower than a general interest in challenging the law.",
    "cite": "Revise SQE Const. & Admin. Law Ch.8; s.7 HRA 1998",
    "principleCN": "s.7 HRA 1998中的'受害者'采用ECtHR的定义。受害者是受到违法行为 personally影响的人——不需要遭受人身伤害或经济损失。该标准比单纯的'不满'更广，但比一般挑战法律的利益更窄。",
    "citeCN": "Revise SQE 宪法与行政法 第8章; s.7 HRA 1998"
  },
  {
    "key": "h2-5",
    "chapter": "Ch 8: Human Rights Act 1998",
    "text": "Under the HRA 1998 claims may be brought against a 'public authority' for acts incompatible with Convention rights. What is the statutory definition of a public authority under s.6?",
    "options": [
      "A person who receives public funding.",
      "A person who performs a governmental function.",
      "A person who has statutory powers.",
      "A person who performs functions of a public nature.",
      "A person who performs a public service."
    ],
    "best": 3,
    "principle": "Section 6 HRA 1998 defines a public authority as a person whose functions are 'functions of a public nature.' The other options are factors a court may consider, but none alone is the definition. The definition is deliberately broad to catch hybrid bodies.",
    "cite": "Revise SQE Const. & Admin. Law Ch.8; s.6 HRA 1998",
    "principleCN": "s.6 HRA 1998将公共机构定义为职能属于'公共性质职能'的人。其他选项是法院可能考虑的因素，但单独都不是定义。该定义故意宽泛以涵盖混合体。",
    "citeCN": "Revise SQE 宪法与行政法 第8章; s.6 HRA 1998"
  },
  {
    "key": "h2-6",
    "chapter": "Ch 8: Human Rights Act 1998",
    "text": "The Supreme Court has issued a declaration of incompatibility under s.4 HRA 1998. A draft remedial order has been presented to Parliament. What is a remedial order under s.10 HRA 1998?",
    "options": [
      "A type of remedy available where a court has issued a declaration of incompatibility.",
      "A type of statutory instrument that allows the Government to quickly amend Acts of Parliament to remove incompatibility with the HRA 1998.",
      "A type of statutory instrument that allows Parliament to quickly overturn legislation deemed incompatible.",
      "A type of bill that must pass through the usual legislative process.",
      "A direction to Parliament to amend Acts to remove incompatibility."

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), saved);
    }
  } catch(e) { console.warn('Load failed:', e); }
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.warn('Save failed:', e); }
}

function applyFS() {
  document.body.classList.remove('fs-lg', 'fs-xl');
  if (state.fsLevel === 1) document.body.classList.add('fs-lg');
  else if (state.fsLevel === 2) document.body.classList.add('fs-xl');
}

function changeFS(dir) {
  state.fsLevel = Math.max(0, Math.min(2, state.fsLevel + dir));
  applyFS();
  save();
}

function renderCoins() {
  document.getElementById('coins').textContent = state.coins;
}

function renderStars() {
  const count = Object.keys(state.stickers).filter(id => {
    const s = state.stickers[id];
    return s.side !== null && s.slot >= 0;
  }).length;
  const filled = Math.floor(count / 4);
  const html = Array.from({length: 5}, (_, i) =>
    `<span class="star ${i < filled ? 'filled' : ''}">${i < filled ? '★' : '☆'}</span>`
  ).join('');
  const top = document.getElementById('stars-top');
  const quiz = document.getElementById('stars-quiz');
  if (top) top.innerHTML = html;
  if (quiz) quiz.innerHTML = html;
}

function getCurrentQuestions() {
  if (state.reviewMode && state.reviewQueue.length > 0) {
    return state.reviewQueue;
  }
  return QUESTIONS;
}

function renderQuestion() {
  const qs = getCurrentQuestions();
  const idx = state.qIndex;
  const q = qs[idx];

  document.getElementById('chapter').textContent = q.chapter;
  document.getElementById('progress').textContent = `Question ${idx + 1} / ${qs.length}`;
  document.getElementById('question-text').textContent = q.text;

  const optsDiv = document.getElementById('options');
  optsDiv.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    const answered = state.answered.includes(q.key);
    if (answered) {
      if (i === q.best) btn.classList.add('correct');
      if (state.wrong[q.key] === i) btn.classList.add('wrong');
    }
    btn.onclick = () => selectOption(i);
    optsDiv.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');
  if (state.answered.includes(q.key)) {
    const isCorrect = state.wrong[q.key] === undefined;
    fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
    let html = isCorrect ? '✅ Correct!' : '❌ Not quite.';
    html += `<div class="principle"><strong>Principle:</strong> ${q.principle}</div>`;
    html += `<div class="principle-cn">${q.principleCN}</div>`;
    html += `<div class="cite">📚 ${q.cite}</div>`;
    html += `<div class="cite">${q.citeCN}</div>`;
    fb.innerHTML = html;
    nextBtn.classList.add('show');
    nextBtn.textContent = idx + 1 < qs.length ? 'Next →' : 'Finish';
  } else {
    fb.className = 'feedback';
    fb.innerHTML = '';
    nextBtn.classList.remove('show');
  }

  const bmBtn = document.getElementById('bookmark-btn');
  if (state.bookmarked.includes(q.key)) {
    bmBtn.classList.add('active');
    bmBtn.textContent = '★';
  } else {
    bmBtn.classList.remove('active');
    bmBtn.textContent = '☆';
  }

  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-nav-btn').disabled = idx === qs.length - 1;

  renderReviewBtn();
}

function toggleBookmark() {
  const q = getCurrentQuestions()[state.qIndex];
  const i = state.bookmarked.indexOf(q.key);
  if (i >= 0) state.bookmarked.splice(i, 1);
  else state.bookmarked.push(q.key);
  save();
  renderQuestion();
}

function selectOption(i) {
  const q = getCurrentQuestions()[state.qIndex];
  const wasAnswered = state.answered.includes(q.key);
  const wasWrong = state.wrong[q.key] !== undefined;

  if (wasAnswered) {
    if (wasWrong) {
      delete state.wrong[q.key];
    }
    if (i === q.best && wasWrong) {
      state.coins += 20;
      renderCoins();
    }
  } else {
    state.answered.push(q.key);
    if (i === q.best) {
      state.coins += 20;
      renderCoins();
    }
  }

  if (i !== q.best) {
    state.wrong[q.key] = i;
  }
  save();
  renderQuestion();
}

function nextQuestion() {
  const qs = getCurrentQuestions();
  if (state.qIndex < qs.length - 1) {
    state.qIndex++;
    save();
    renderQuestion();
  } else {
    if (state.reviewMode) {
      exitReviewMode();
    } else {
      state.qIndex = 0;
      save();
      renderQuestion();
    }
  }
}

function prevQuestion() {
  if (state.qIndex > 0) {
    state.qIndex--;
    save();
    renderQuestion();
  }
}

function getReviewQuestions() {
  return QUESTIONS.filter(q => state.wrong[q.key] !== undefined);
}

function renderReviewBtn() {
  const reviewBtn = document.getElementById('review-btn');
  const wrongQs = getReviewQuestions();
  if (wrongQs.length > 0 && !state.reviewMode) {
    reviewBtn.style.display = '';
    reviewBtn.textContent = `Review Wrong (${wrongQs.length})`;
  } else {
    reviewBtn.style.display = 'none';
  }
}

function startReview() {
  const wrongQs = getReviewQuestions();
  if (wrongQs.length === 0) return;
  state.reviewMode = true;
  state.reviewQueue = wrongQs;
  state.qIndex = 0;
  save();
  renderQuestion();
}

function exitReviewMode() {
  state.reviewMode = false;
  state.reviewQueue = [];
  state.qIndex = 0;
  save();
  renderQuestion();
}

function renderStickers() {
  ['left', 'right'].forEach(side => {
    const col = document.getElementById('col-' + side);
    const label = col.querySelector('.col-label');
    col.innerHTML = '';
    col.appendChild(label);
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid; grid-template-columns: 1fr; gap: 6px;';
    for (let i = 0; i < SLOTS_PER_COL; i++) {
      const slot = document.createElement('div');
      slot.className = 'sticker-slot';
      let placedItem = null;
      for (const [id, data] of Object.entries(state.stickers)) {
        if (data.side === side && data.slot === i) {
          placedItem = STICKERS.find(s => s.id === id);
          break;
        }
      }
      if (placedItem) {
        slot.classList.add('filled');
        slot.innerHTML = placedItem.icon;
        const x = document.createElement('div');
        x.className = 'remove-x';
        x.textContent = '×';
        x.onclick = (e) => { e.stopPropagation(); removeSticker(placedItem.id); };
        slot.appendChild(x);
      } else {
        slot.innerHTML = '<span class="empty-hint">+</span>';
      }
      slot.onclick = () => placeSticker(side, i);
      grid.appendChild(slot);
    }
    col.appendChild(grid);
  });
  renderStars();
}

function removeSticker(id) {
  state.stickers[id] = { side: null, slot: -1 };
  save();
  renderStickers();
}

function placeSticker(side, slot) {
  if (!state.placementItem) return;
  for (const [id, data] of Object.entries(state.stickers)) {
    if (data.side === side && data.slot === slot && id !== state.placementItem) {
      state.stickers[id] = { side: null, slot: -1 };
      break;
    }
  }
  state.stickers[state.placementItem] = { side: side, slot: slot };
  state.placementItem = null;
  document.getElementById('placement-banner').classList.remove('show');
  save();
  renderStickers();
}

function cancelPlacement() {
  state.placementItem = null;
  document.getElementById('placement-banner').classList.remove('show');
  save();
}

function openShop() {
  document.getElementById('shop-coins').textContent = state.coins;
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  STICKERS.forEach(s => {
    const item = document.createElement('div');
    item.className = 'shop-item';
    const owned = state.stickers[s.id] !== undefined;
    const placed = owned && state.stickers[s.id].side !== null && state.stickers[s.id].slot >= 0;
    if (owned) item.classList.add('owned');
    item.innerHTML = `
      <div class="icon">${s.icon}</div>
      <div class="name">${s.name}</div>
      <div class="price">💰 ${s.price}</div>
    `;
    if (!owned) {
      const btn = document.createElement('button');
      btn.textContent = 'Buy';
      btn.disabled = state.coins < s.price;
      btn.onclick = () => buySticker(s.id);
      item.appendChild(btn);
    } else if (!placed) {
      const btn = document.createElement('button');
      btn.textContent = 'Stick';
      btn.onclick = () => startPlacement(s.id);
      item.appendChild(btn);
    }
    grid.appendChild(item);
  });
  document.getElementById('shop-overlay').classList.add('show');
}

function closeShop() {
  document.getElementById('shop-overlay').classList.remove('show');
}

function buySticker(id) {
  const s = STICKERS.find(x => x.id === id);
  if (!s) return;
  if (state.coins < s.price) return;
  state.coins -= s.price;
  state.stickers[id] = { side: null, slot: -1 };
  save();
  renderCoins();
  openShop();
  startPlacement(id);
}

function startPlacement(id) {
  state.placementItem = id;
  document.getElementById('placement-banner').classList.add('show');
  closeShop();
}

function init() {
  load();
  applyFS();
  renderCoins();
  renderStickers();
  renderStars();
  renderQuestion();

  document.addEventListener('keydown', (e) => {
    if (e.key === 's' && e.shiftKey) {
      e.preventDefault();
      openShop();
    }
  });

  const rightDiv = document.querySelector('.topbar .right');
  if (rightDiv) {
    const shopBtn = document.createElement('button');
    shopBtn.className = 'fs-btn';
    shopBtn.textContent = '🏷️';
    shopBtn.style.marginRight = '4px';
    shopBtn.onclick = openShop;
    rightDiv.insertBefore(shopBtn, rightDiv.firstChild);
  }
}

init();
</script>
</body>
</html>
