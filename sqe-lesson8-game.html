<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SQE1 Quiz · Contract Law · Offer & Acceptance</title>
<style>
  :root {
    --paper: #f4ecd8;
    --paper-2: #e8dcb8;
    --ink: #2a2620;
    --ink-soft: #5a5246;
    --seal: #8b1a1a;
    --gold: #b8860b;
    --gold-light: #daa520;
    --ok: #2e6b3e;
    --line: #8a7a5c;
    --fs-body: 18px;
    --fs-h1: 24px;
    --fs-h2: 20px;
    --fs-card: 18px;
    --fs-small: 14px;
  }
  body.fs-lg { --fs-body: 22px; --fs-h1: 28px; --fs-h2: 24px; --fs-card: 22px; --fs-small: 17px; }
  body.fs-xl { --fs-body: 26px; --fs-h1: 32px; --fs-h2: 28px; --fs-card: 26px; --fs-small: 20px; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #1a1812;
    font-family: 'Georgia', 'Times New Roman', 'Songti SC', serif;
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    max-width: 1000px;
    margin: 0 auto;
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--gold);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar .title { font-size: var(--fs-h2); font-weight: bold; color: var(--gold-light); letter-spacing: 1px; }
  .topbar .right { display: flex; gap: 12px; align-items: center; }
  .topbar .coins { font-size: var(--fs-body); }
  .topbar .coins .val { color: var(--gold-light); font-weight: bold; }
  .topbar .fs-btn {
    background: transparent; color: var(--paper);
    border: 1px solid var(--paper-2);
    padding: 2px 10px; font-family: inherit;
    cursor: pointer; font-size: var(--fs-small);
  }
  .topbar .fs-btn:hover { background: var(--paper-2); color: var(--ink); }

  /* ===== MAIN LAYOUT: left stickers | center quiz | right stickers ===== */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 120px 1fr 120px;
    gap: 0;
  }

  /* Sticker columns */
  .sticker-col {
    background: var(--paper-2);
    border-right: 1px dashed var(--line);
    padding: 8px 6px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 400px;
  }
  .sticker-col.right { border-right: none; border-left: 1px dashed var(--line); }
  .sticker-col .col-label {
    font-size: 11px; color: var(--ink-soft);
    text-align: center; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .sticker-slot {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.3);
    border: 1px dashed var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    font-size: 28px;
  }
  .sticker-slot.filled { background: rgba(255,255,255,0.6); border-style: solid; border-color: var(--gold); }
  .sticker-slot.filled:hover .remove-x { display: block; }
  .sticker-slot .remove-x {
    display: none;
    position: absolute; top: 0; right: 2px;
    background: var(--seal); color: white;
    width: 16px; height: 16px;
    font-size: 10px; line-height: 16px;
    text-align: center; cursor: pointer;
    border-radius: 2px;
  }
  .sticker-slot .empty-hint { font-size: 11px; color: var(--ink-soft); opacity: 0.5; }

  /* ===== CENTER QUIZ AREA ===== */
  .quiz {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--fs-small);
    color: var(--ink-soft);
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
  }
  .quiz-header .progress { font-weight: bold; color: var(--seal); }

  .question {
    font-size: var(--fs-body);
    line-height: 1.7;
    padding: 14px 16px;
    background: rgba(255,255,255,0.5);
    border-left: 4px solid var(--gold);
  }
  .question .q-label {
    display: block;
    font-size: var(--fs-small);
    color: var(--seal);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: white;
    border: 2px solid var(--line);
    padding: 14px 16px;
    font-family: inherit;
    font-size: var(--fs-card);
    line-height: 1.5;
    text-align: left;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
  }
  .option::before {
    content: '○';
    margin-right: 8px;
    color: var(--gold);
    font-weight: bold;
  }
  .option:hover { transform: translateX(3px); border-color: var(--gold); box-shadow: 2px 2px 0 var(--paper-2); }
  .option.selected { background: rgba(184,134,11,0.12); border-color: var(--gold); }
  .option.selected::before { content: '●'; }
  .option.revealed { opacity: 0.5; pointer-events: none; }
  .option.best { background: rgba(46,107,62,0.12); border-color: var(--ok); opacity: 1; }
  .option.best::before { content: '✓'; color: var(--ok); }

  .feedback {
    background: linear-gradient(135deg, rgba(184,134,11,0.1), rgba(46,107,62,0.1));
    border-left: 4px solid var(--ok);
    padding: 12px 16px;
    font-size: var(--fs-body);
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; animation: fadeIn 0.3s; }
  .feedback .fb-label { font-size: var(--fs-small); color: var(--ok); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
  .feedback .fb-principle { margin-top: 6px; font-style: italic; }
  .feedback .fb-principle-cn { margin-top: 4px; font-size: var(--fs-small); color: var(--ink-soft); line-height: 1.6; }
  .feedback .fb-cite { margin-top: 4px; font-size: var(--fs-small); color: var(--ink-soft); }
  .feedback .fb-cite-cn { margin-top: 2px; font-size: var(--fs-small); color: var(--ink-soft); }
  .feedback .fb-reward { margin-top: 8px; color: var(--gold); font-weight: bold; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .quiz-actions { display: flex; gap: 10px; }
  .btn {
    background: var(--ink); color: var(--paper);
    border: none; padding: 12px 20px;
    font-family: inherit; font-size: var(--fs-body);
    cursor: pointer; letter-spacing: 1px;
    text-transform: uppercase; flex: 1;
  }
  .btn:hover { background: var(--seal); }
  .btn.gold { background: var(--gold); color: var(--ink); }
  .btn.gold:hover { background: var(--seal); color: var(--paper); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* ===== SHOP MODAL ===== */
  .shop-modal {
    position: fixed; inset: 0;
    background: rgba(26,24,18,0.85);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .shop-modal.show { display: flex; }
  .shop-content {
    background: var(--paper);
    border: 3px solid var(--gold);
    padding: 20px;
    max-width: 560px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .shop-content h2 { color: var(--seal); font-size: var(--fs-h1); margin-bottom: 12px; text-align: center; }
  .shop-content .shop-coins { text-align: center; font-size: var(--fs-h2); color: var(--gold); font-weight: bold; margin-bottom: 14px; }
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }
  .shop-item {
    background: white;
    border: 2px solid var(--line);
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .shop-item:hover:not(.unaffordable):not(.owned) { transform: translateY(-2px); box-shadow: 0 3px 0 var(--paper-2); border-color: var(--gold); }
  .shop-item.unaffordable { opacity: 0.4; cursor: not-allowed; }
  .shop-item.owned { background: rgba(46,107,62,0.1); border-color: var(--ok); cursor: pointer; }
  .shop-item .si-icon { font-size: 32px; line-height: 1; }
  .shop-item .si-name { font-size: var(--fs-small); margin-top: 4px; }
  .shop-item .si-price { color: var(--gold); font-weight: bold; margin-top: 4px; font-size: var(--fs-small); }
  .shop-item.owned .si-price::after { content: ' ✓'; }
  .shop-item.unaffordable .si-price::after { content: ' (need more)'; font-size: 0.8em; }
  .shop-close {
    display: block;
    margin: 16px auto 0;
    background: var(--ink); color: var(--paper);
    border: none; padding: 10px 24px;
    font-family: inherit; font-size: var(--fs-body);
    cursor: pointer; letter-spacing: 1px;
  }
  .shop-close:hover { background: var(--seal); }

  /* ===== PLACEMENT MODE ===== */
  .placement-hint {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--seal); color: white;
    padding: 10px 20px; font-size: var(--fs-small);
    z-index: 300; border-radius: 4px;
    display: none;
  }
  .placement-hint.show { display: block; }
  .sticker-col.placement-mode .sticker-slot { border-color: var(--gold); background: rgba(184,134,11,0.15); }
  .sticker-col.placement-mode .sticker-slot:hover { background: rgba(184,134,11,0.3); }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    .main { grid-template-columns: 70px 1fr 70px; }
    .sticker-col { padding: 6px 4px; }
    .sticker-slot { font-size: 20px; }
    .sticker-slot .empty-hint { display: none; }
    .quiz { padding: 14px 12px; }
    .topbar .title { font-size: 16px; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="title">⚖ SQE · Contract Law</div>
    <div class="right">
      <div class="coins">💰 <span class="val" id="coins">0</span></div>
      <button class="fs-btn" onclick="changeFS(-1)">A-</button>
      <button class="fs-btn" onclick="changeFS(1)">A+</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- LEFT STICKER COLUMN -->
    <div class="sticker-col left" id="col-left">
      <div class="col-label">Left</div>
    </div>

    <!-- CENTER QUIZ -->
    <div class="quiz" id="quiz">
      <div class="quiz-header">
        <span>Question <span class="progress" id="q-num">1</span> / <span id="q-total">20</span></span>
        <span>Chapter <span id="q-chapter">—</span></span>
        <button id="btn-bookmark" class="fs-btn" style="background:transparent; border:1px solid var(--line); color:var(--ink-soft); font-size:var(--fs-h2); padding:2px 8px; cursor:pointer;">☆</button>
      </div>
      <div class="question">
        <span class="q-label">The Brief</span>
        <span id="q-text">—</span>
      </div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <div class="fb-label">📜 Principle</div>
        <div class="fb-principle" id="fb-principle">—</div>
        <div class="fb-principle-cn" id="fb-principle-cn">—</div>
        <div class="fb-cite" id="fb-cite">—</div>
        <div class="fb-cite-cn" id="fb-cite-cn">—</div>
        <div class="fb-reward" id="fb-reward">—</div>
      </div>
      <div class="quiz-actions">
        <button class="btn gold" id="btn-shop" onclick="openShop()">🏪 Shop</button>
        <button class="btn" id="btn-next" onclick="nextQuestion()" disabled>Next →</button>
      </div>
    </div>

    <!-- RIGHT STICKER COLUMN -->
    <div class="sticker-col right" id="col-right">
      <div class="col-label">Right</div>
    </div>
  </div>
</div>

<!-- SHOP MODAL -->
<div class="shop-modal" id="shop-modal">
  <div class="shop-content">
    <h2>🏪 Sticker Shop</h2>
    <div class="shop-coins">💰 You have <span id="shop-coins-val">0</span> coins</div>
    <div class="shop-grid" id="shop-grid"></div>
    <button class="shop-close" onclick="closeShop()">Close</button>
  </div>
</div>

<!-- PLACEMENT HINT -->
<div class="placement-hint" id="placement-hint">
  Click a slot on the left or right column to place your sticker
</div>

<script>
/* ===== STATE ===== */
const STORAGE_KEY = 'sqe-l8-stickers-v1';
const DEFAULT_STATE = {
  coins: 0,
  qIndex: 0,
  answered: [],       // question keys answered (all)
  wrong: {},           // { qKey: { selected: idx, best: idx } } — only wrong answers saved
  bookmarked: [],     // question keys manually starred
  stickers: {},       // { itemId: { side: 'left'|'right', slot: 0-9 } }
  placementItem: null,
  fsLevel: 0,
  reviewMode: false,
  reviewQueue: []
};
let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch(e) {}
  applyFS();
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

/* ===== FONT SIZE ===== */
const FS_CLASSES = ['', 'fs-lg', 'fs-xl'];
function applyFS() { document.body.className = FS_CLASSES[state.fsLevel] || ''; }
function changeFS(d) {
  state.fsLevel = Math.max(0, Math.min(2, state.fsLevel + d));
  applyFS(); save();
}

/* ===== QUESTIONS ===== */
// Each: key, chapter, text (scenario), 4 options (all correct statements, 1 is "best fit")
// "best" = index of the best answer. No wrong answers — just "most fitting".
const QUESTIONS = [
  {
    "key": "c1",
    "chapter": "1 · Offer vs ITT",
    "text": "A man places an advertisement in a local newspaper: 'Digital camera. Bought for £500, but may sell for £100. Contact me at the following address if you wish to buy.' A woman sees the advertisement and posts a letter saying she will buy the camera for £100. The man replies that the camera has already been sold. The woman claims there is a binding contract. What is the correct analysis?",
    "options": [
      "The advertisement is an invitation to treat, not an offer — words like 'may sell' and 'contact me if you wish to buy' show no intention to be bound. The woman's letter was an offer that the man rejected.",
      "The advertisement is a unilateral offer that the woman accepted by posting her letter.",
      "The advertisement is a bilateral offer that the woman accepted by post under the postal rule.",
      "The advertisement is an offer because it states a specific price (£100) for a specific item."
    ],
    "best": 0,
    "principle": "Advertisements are generally invitations to treat, not offers. The wording 'may sell' and 'contact me if you wish to buy' is not conducive with contractual intent. If it were an offer, there would be a problem of multi-acceptance (only one camera but potentially unlimited acceptances).",
    "cite": "Revise SQE Contract Law, Ch 1; FLK1 Practice 180 Q",
    "principleCN": "广告通常是要约邀请，不是要约。'may sell'（可能卖）和 'contact me if you wish to buy'（如果想买请联系我）的措辞不表明受法律约束的意图。如果要约的话还会产生多人接受的问题（只有一台相机但可能有无限制的接受）。",
    "citeCN": "Revise SQE 合同法, 第1章; FLK1 练习题"
  },
  {
    "key": "c2",
    "chapter": "1 · Offer vs ITT",
    "text": "A shop displays goods on its shelves with price tags. A customer picks up an item and takes it to the till. At what point is the offer made?",
    "options": [
      "The display of goods is an invitation to treat; the customer makes the offer by taking the item to the till; the shop accepts by processing the sale.",
      "The display of goods is an offer; the customer accepts by picking up the item from the shelf.",
      "The display is neither an offer nor an invitation to treat — it is merely decorative.",
      "The shop makes the offer when it puts the price tag on the item."
    ],
    "best": 0,
    "principle": "Display of goods in a shop is an invitation to treat (Pharmaceutical Society v Boots [1953]). The customer makes the offer at the till, and the shopkeeper accepts or refuses. This protects the shopkeeper from being forced to sell to everyone.",
    "cite": "Pharmaceutical Society of Great Britain v Boots Cash Chemists [1953] 1 QB 401",
    "principleCN": "商店货架上的商品展示是要约邀请（Boots 案 [1953]）。顾客在收银台提出要约，店主决定接受或拒绝。这保护店主不被强制向所有人出售。",
    "citeCN": "Pharmaceutical Society v Boots [1953] 1 QB 401"
  },
  {
    "key": "c3",
    "chapter": "1 · Offer vs ITT",
    "text": "Which of the following is correctly classified as an OFFER (not an invitation to treat)?",
    "options": [
      "An auction 'without reserve' — the auctioneer makes a unilateral offer to sell to the highest bidder.",
      "A general advertisement in a newspaper announcing a product and its price.",
      "A request for tenders where the requester asks companies to submit quotes.",
      "A shop display of goods on shelves with price tags."
    ],
    "best": 0,
    "principle": "An auction 'without reserve' is a unilateral offer — a promise to sell to the highest bidder (Barry v Davies [2000]). This is an exception to the general rule that auction requests for bids are invitations to treat.",
    "cite": "Barry v Davies [2000] 1 WLR 1962",
    "principleCN": "\"无保留\"拍卖是一项单方要约——向最高出价者出售的承诺（Barry v Davies [2000]）。这是一般规则（拍卖邀请是要约邀请）的例外。",
    "citeCN": "Barry v Davies [2000] 1 WLR 1962"
  },
  {
    "key": "c4",
    "chapter": "2 · Unilateral Offers",
    "text": "A zookeeper offers a £100 reward in the local paper to the first person who returns a lost goat. A man finds the goat but does NOT see the advertisement. He returns the goat to the zoo. Later, a colleague tells him about the reward. Can the man claim the £100?",
    "options": [
      "No — the man was not aware of the offer when he performed the act, so he cannot have accepted it. Awareness of the offer is always required, even for unilateral offers.",
      "Yes — performing the requested act is sufficient to accept a unilateral offer, regardless of awareness.",
      "Yes — the man performed the exact act requested, so acceptance is complete.",
      "No — the man accepted a chocolate bar from the zookeeper, which counts as alternative performance."
    ],
    "best": 0,
    "principle": "It is a key requirement of acceptance that the person purporting to accept must be aware of the offer. Even for unilateral offers, performing the requested act without knowledge of the offer does not constitute acceptance.",
    "cite": "Revise SQE Contract Law, Ch 1",
    "principleCN": "接受要约的一个关键要求是：接受者必须知道要约的存在。即使是单方要约，在不知道要约的情况下完成了要求的行为，也不构成接受。",
    "citeCN": "Revise SQE 合同法, 第1章"
  },
  {
    "key": "c5",
    "chapter": "2 · Unilateral Offers",
    "text": "A company advertises: '£100 to anyone who catches flu after using our smoke ball as directed for two weeks.' Mrs Carlill buys the smoke ball, uses it as directed, and catches flu. What is the correct analysis?",
    "options": [
      "The advertisement is a unilateral offer accepted by Mrs Carlill's performance (buying and using the product as directed). No separate communication of acceptance is needed.",
      "The advertisement is an invitation to treat; Mrs Carlill made the offer by buying the product.",
      "The advertisement is a bilateral offer requiring Mrs Carlill to notify the company of her acceptance.",
      "The advertisement is merely a promotional puff with no legal effect."
    ],
    "best": 0,
    "principle": "Carlill v Carbolic Smoke Ball Co [1893]: the advertisement was a unilateral offer. The offeror makes a promise in exchange for the offeree performing an act. Acceptance is by performance — no communication of acceptance is needed. The £100 deposit in the bank showed intention to be bound.",
    "cite": "Carlill v Carbolic Smoke Ball Co [1893] 1 QB 256 (CA)",
    "principleCN": "Carlill v Carbolic Smoke Ball Co [1893]：广告构成单方要约。要约人以承诺交换受要约人的行为。通过履行行为即构成接受——不需要另行通知接受。银行存入£100保证金表明了受约束的意图。",
    "citeCN": "Carlill v Carbolic Smoke Ball [1893] 1 QB 256 (CA)"
  },
  {
    "key": "c6",
    "chapter": "3 · Communication of Acceptance",
    "text": "A supplier emails a customer offering 10 tons of apples for £2,000. The customer telephones to accept, but the line is bad and the supplier cannot hear the acceptance despite the customer repeating it twice before the call drops. Is there a binding contract?",
    "options": [
      "No — in a bilateral offer, the offeree must communicate acceptance effectively. It is the offeree's responsibility to ensure the offeror actually hears the acceptance. No contract was formed.",
      "Yes — the customer tried twice to communicate acceptance, so the supplier bears the risk of the bad line.",
      "Yes — the customer's attempt to accept by telephone is sufficient even if the supplier did not hear.",
      "No — but the supplier must call the customer back to check what was said."
    ],
    "best": 0,
    "principle": "In a bilateral offer, acceptance must be communicated to and received by the offeror. It is the offeree's responsibility to ensure acceptance is actually received. If the offeror does not hear the acceptance (e.g., bad phone line), no contract is formed. The offeror has no duty to chase the acceptance.",
    "cite": "Revise SQE Contract Law, Ch 1",
    "principleCN": "在双边要约中，接受必须有效传达给要约人。受要约人有责任确保要约人确实收到接受。如果要约人没有听到接受（如电话线路不好），合同不成立。要约人没有义务去追查接受。",
    "citeCN": "Revise SQE 合同法, 第1章"
  },
  {
    "key": "c7",
    "chapter": "3 · Postal Rule",
    "text": "A man writes to a woman offering to sell his gold watch for £5,000, promising to keep the offer open for five days. The woman receives the letter two days later and immediately posts her acceptance by Royal Mail. The letter is delayed and arrives seven days after the offer was sent. Meanwhile, on day six, the man sells the watch to a third party. Has the man breached a contract with the woman?",
    "options": [
      "Yes — the postal rule makes acceptance effective when posted (day 2), before the man sold the watch (day 6). The promise to keep the offer open for five days was not binding (no consideration), but the acceptance was still effective within that period.",
      "No — the woman's acceptance arrived after the five-day period, so the offer had lapsed.",
      "No — the man's promise to keep the offer open was not supported by consideration, so he was free to sell to anyone.",
      "No — the postal rule does not apply when the offer specifies a time limit."
    ],
    "best": 0,

const SLOTS_PER_COL = 8;

/* ===== RENDER ===== */
function renderCoins() {
  document.getElementById('coins').textContent = state.coins;
}

function renderQuestion() {
  const q = QUESTIONS[state.qIndex];
  const total = state.reviewMode ? state.reviewQueue.length : QUESTIONS.length;
  const num = state.reviewMode ? (state.reviewQueue.indexOf(state.qIndex) + 1) : (state.qIndex + 1);

  const qNumEl = document.getElementById('q-num');
  const qTotalEl = document.getElementById('q-total');
  const qChEl = document.getElementById('q-chapter');
  if (qNumEl) qNumEl.textContent = num;
  if (qTotalEl) qTotalEl.textContent = total;
  if (qChEl) qChEl.textContent = q.chapter;
  document.getElementById('q-text').textContent = q.text;

  // Bookmark button
  const bmBtn = document.getElementById('btn-bookmark');
  if (bmBtn) {
    const isMarked = state.bookmarked.includes(q.key);
    bmBtn.textContent = isMarked ? '★' : '☆';
    bmBtn.style.color = isMarked ? 'var(--gold)' : 'var(--ink-soft)';
    bmBtn.onclick = () => toggleBookmark(q.key);
  }

  // Shuffle options each time — don't let player memorise position
  const indices = q.options.map((_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  q._displayOrder = indices; // displayOrder[displayIdx] = originalIdx
  q._bestDisplay = indices.indexOf(q.best);

  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';

  indices.forEach((origIdx, displayIdx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = q.options[origIdx];
    btn.onclick = () => selectOption(displayIdx);
    optsEl.appendChild(btn);
  });

  document.getElementById('feedback').classList.remove('show');
  document.getElementById('btn-next').disabled = true;

  renderReviewBtn();
}

function toggleBookmark(key) {
  const idx = state.bookmarked.indexOf(key);
  if (idx >= 0) {
    state.bookmarked.splice(idx, 1);
  } else {
    state.bookmarked.push(key);
  }
  save();
  renderQuestion();
}

function selectOption(displayIdx) {
  const q = QUESTIONS[state.qIndex];
  const opts = document.querySelectorAll('.option');
  opts.forEach((el, idx) => {
    el.classList.add('revealed');
    if (idx === q._bestDisplay) el.classList.add('best');
    if (idx === displayIdx) el.classList.add('selected');
  });

  const isBest = (displayIdx === q._bestDisplay);
  if (!state.answered.includes(q.key)) state.answered.push(q.key);

  if (isBest) {
    // Correct — remove from wrong if it was there
    delete state.wrong[q.key];
  } else {
    // Wrong — save it (store original option index, not display position)
    state.wrong[q.key] = { selectedOrig: q._displayOrder[displayIdx], best: q.best };
  }

  const reward = isBest ? 30 : 0;
  if (isBest) state.coins += reward;
  save();
  renderCoins();

  const fbLabel = isBest ? '✓ Best answer · +' + reward + ' 💰' : '⚠ No coins — added to review';
  document.getElementById('fb-principle').textContent = q.principle;
  document.getElementById('fb-principle-cn').textContent = q.principleCN || '';
  document.getElementById('fb-cite').textContent = '📜 ' + q.cite;
  document.getElementById('fb-cite-cn').textContent = q.citeCN || '';
  document.getElementById('fb-reward').innerHTML = '<span style="color:' + (isBest ? 'var(--gold)' : 'var(--seal)') + ';">' + fbLabel + '</span>';
  document.getElementById('feedback').classList.add('show');
  document.getElementById('btn-next').disabled = false;
  renderReviewBtn();
}

function nextQuestion() {
  if (state.reviewMode) {
    // In review mode, go to next in reviewQueue
    const curPos = state.reviewQueue.indexOf(state.qIndex);
    if (curPos + 1 < state.reviewQueue.length) {
      state.qIndex = state.reviewQueue[curPos + 1];
    } else {
      // Review done
      exitReviewMode();
      return;
    }
    save();
    renderQuestion();
    return;
  }

  if (state.qIndex + 1 < QUESTIONS.length) {
    state.qIndex++;
  } else {
    state.qIndex = 0; // loop back to start
  }
  save();
  renderQuestion();
}

/* ===== REVIEW MODE ===== */
function getReviewQuestions() {
  // Wrong answers + bookmarked questions, deduplicated, sorted by index
  const set = new Set();
  // Wrong answers
  QUESTIONS.forEach((q, i) => {
    if (state.wrong[q.key]) set.add(i);
  });
  // Bookmarked
  QUESTIONS.forEach((q, i) => {
    if (state.bookmarked.includes(q.key)) set.add(i);
  });
  return [...set].sort((a, b) => a - b);
}

function renderReviewBtn() {
  const reviewList = getReviewQuestions();
  let btn = document.getElementById('btn-review');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'btn-review';
    btn.className = 'btn';
    btn.style.cssText = 'background: var(--seal); flex: 1; display: none;';
    document.querySelector('.quiz-actions').insertBefore(btn, document.getElementById('btn-shop'));
  }
  if (reviewList.length > 0) {
    const wrongCount = Object.keys(state.wrong).length;
    const bmCount = state.bookmarked.length;
    btn.style.display = 'block';
    btn.textContent = '📋 Review (' + reviewList.length + ')';
    btn.onclick = () => startReview();
  } else {
    btn.style.display = 'none';
  }
}

function startReview() {
  state.reviewMode = true;
  state.reviewQueue = getReviewQuestions();
  if (state.reviewQueue.length === 0) return;
  state.qIndex = state.reviewQueue[0];
  save();
  document.getElementById('btn-review').style.display = 'none';
  // Show exit button
  let exitBtn = document.getElementById('btn-exit-review');
  if (!exitBtn) {
    exitBtn = document.createElement('button');
    exitBtn.id = 'btn-exit-review';
    exitBtn.className = 'btn';
    exitBtn.style.cssText = 'background: var(--ink-soft); flex: 1;';
    exitBtn.textContent = '✕ Exit Review';
    exitBtn.onclick = () => exitReviewMode();
    document.querySelector('.quiz-actions').appendChild(exitBtn);
  }
  exitBtn.style.display = 'block';
  renderQuestion();
}

function exitReviewMode() {
  state.reviewMode = false;
  state.reviewQueue = [];
  save();
  const exitBtn = document.getElementById('btn-exit-review');
  if (exitBtn) exitBtn.style.display = 'none';
  // Go to first unanswered or back to start
  const firstUnanswered = QUESTIONS.findIndex(q => !state.answered.includes(q.key));
  state.qIndex = firstUnanswered >= 0 ? firstUnanswered : 0;
  save();
  renderQuestion();
  renderReviewBtn();
}

/* ===== STICKER COLUMNS ===== */
function renderStickers() {
  ['left', 'right'].forEach(side => {
    const col = document.getElementById('col-' + side);
    // Clear except label
    const label = col.querySelector('.col-label');
    col.innerHTML = '';
    col.appendChild(label);

    for (let i = 0; i < SLOTS_PER_COL; i++) {
      const slot = document.createElement('div');
      slot.className = 'sticker-slot';

      // Find if any sticker is placed here
      let placedItem = null;
      for (const [id, data] of Object.entries(state.stickers)) {
        if (data.side === side && data.slot === i) {
          placedItem = STICKERS.find(s => s.id === id);
          break;
        }
      }

      if (placedItem) {
        slot.classList.add('filled');
        slot.innerHTML = placedItem.icon;
        const x = document.createElement('div');
        x.className = 'remove-x';
        x.textContent = '×';
        x.onclick = (e) => { e.stopPropagation(); removeSticker(placedItem.id); };
        slot.appendChild(x);
      } else {
        slot.innerHTML = '<span class="empty-hint">+</span>';
      }

      slot.onclick = () => placeSticker(side, i);
      col.appendChild(slot);
    }
  });
}

function removeSticker(itemId) {
  delete state.stickers[itemId];
  save();
  renderStickers();
}

function placeSticker(side, slotIdx) {
  if (!state.placementItem) return;

  // Remove from current position if any
  if (state.stickers[state.placementItem]) {
    delete state.stickers[state.placementItem];
  }

  // Check if target slot is occupied
  for (const [id, data] of Object.entries(state.stickers)) {
    if (data.side === side && data.slot === slotIdx) {
      delete state.stickers[id]; // remove occupant
    }
  }

  state.stickers[state.placementItem] = { side, slot: slotIdx };
  state.placementItem = null;
  document.getElementById('placement-hint').classList.remove('show');
  document.querySelectorAll('.sticker-col').forEach(c => c.classList.remove('placement-mode'));
  save();
  renderStickers();
}

/* ===== SHOP ===== */
function openShop() {
  document.getElementById('shop-coins-val').textContent = state.coins;
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  STICKERS.forEach(s => {
    const owned = state.stickers[s.id] !== undefined || state.placementItem === s.id;
    const canAfford = state.coins >= s.price;
    const div = document.createElement('div');
    div.className = 'shop-item';
    if (owned) div.classList.add('owned');
    else if (!canAfford) div.classList.add('unaffordable');
    div.innerHTML = `
      <div class="si-icon">${s.icon}</div>
      <div class="si-name">${s.name}</div>
      <div class="si-price">${s.price} 💰</div>
    `;
    if (!owned && canAfford) {
      div.onclick = () => buySticker(s.id);
    } else if (owned) {
      div.onclick = () => startPlacement(s.id);
    }
    grid.appendChild(div);
  });
  document.getElementById('shop-modal').classList.add('show');
}

function closeShop() {
  document.getElementById('shop-modal').classList.remove('show');
}

function buySticker(id) {
  const s = STICKERS.find(ss => ss.id === id);
  if (state.coins < s.price) return;
  state.coins -= s.price;
  // Store as owned but unplaced
  state.stickers[id] = { side: null, slot: -1 };
  save();
  renderCoins();
  openShop(); // refresh
  // Immediately start placement
  startPlacement(id);
}

function startPlacement(id) {
  state.placementItem = id;
  closeShop();
  document.getElementById('placement-hint').classList.add('show');
  document.querySelectorAll('.sticker-col').forEach(c => c.classList.add('placement-mode'));
}

/* ===== INIT ===== */
function init() {
  load();
  // Resume from first unanswered question
  const firstUnanswered = QUESTIONS.findIndex(q => !state.answered.includes(q.key));
  if (firstUnanswered >= 0 && firstUnanswered !== state.qIndex) {
    state.qIndex = firstUnanswered;
  }
  renderCoins();
  renderQuestion();
  renderStickers();
}
init();
</script>
