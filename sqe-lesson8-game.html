<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQE · Contract Law — Quiz & Sticker Collection</title>
<style>
:root {
    --paper: #f4ecd8;
    --paper-2: #e8dcb8;
    --ink: #2a2620;
    --ink-soft: #5a5246;
    --seal: #8b1a1a;
    --gold: #b8860b;
    --gold-light: #daa520;
    --ok: #2e6b3e;
    --line: #8a7a5c;
    --fs-body: 18px;
    --fs-h1: 24px;
    --fs-h2: 20px;
    --fs-card: 18px;
    --fs-small: 14px;
}
body.fs-lg { --fs-body: 22px; --fs-h1: 28px; --fs-h2: 24px; --fs-card: 22px; --fs-small: 17px; }
body.fs-xl { --fs-body: 26px; --fs-h1: 32px; --fs-h2: 28px; --fs-card: 26px; --fs-small: 20px; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--paper);
    color: var(--ink);
    font-size: var(--fs-body);
    line-height: 1.6;
    min-height: 100vh;
}

/* Topbar */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--paper-2);
    border-bottom: 2px solid var(--line);
    flex-wrap: wrap;
    gap: 8px;
}
.topbar .title {
    font-size: var(--fs-h1);
    font-weight: bold;
    color: var(--ink);
    white-space: nowrap;
}
.topbar .right {
    display: flex;
    align-items: center;
    gap: 8px;
}
.topbar .coins {
    font-size: var(--fs-body);
    font-weight: bold;
    color: var(--gold);
    background: var(--paper);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--gold-light);
}
.topbar .fs-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: var(--fs-small);
    color: var(--ink);
    font-family: Georgia, serif;
}
.topbar .fs-btn:hover { background: var(--paper-2); }

/* Stars */
.stars {
    display: flex;
    gap: 2px;
    align-items: center;
}
.stars .star {
    font-size: var(--fs-h2);
    color: var(--ink-soft);
    opacity: 0.3;
}
.stars .star.filled {
    color: var(--gold);
    opacity: 1;
}

/* Main layout */
.main {
    display: grid;
    grid-template-columns: 200px 1fr 200px;
    gap: 0;
    min-height: calc(100vh - 60px);
}

/* Sticker columns */
.sticker-col {
    width: 200px;
    padding: 8px 6px;
    background: var(--paper-2);
    border-right: 1px solid var(--line);
    border-left: 1px solid var(--line);
}
.sticker-col.col-right {
    border-right: none;
    border-left: 1px solid var(--line);
}
.sticker-col .col-label {
    text-align: center;
    font-size: var(--fs-small);
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.sticker-col .sticker-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
}
.sticker-slot {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: var(--paper);
    border: 1px dashed var(--line);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
}
.sticker-slot:hover { background: var(--paper-2); }
.sticker-slot.filled {
    border-style: solid;
    border-color: var(--gold);
    background: var(--paper);
}
.sticker-slot .empty-hint {
    color: var(--ink-soft);
    opacity: 0.4;
    font-size: var(--fs-h2);
}
.sticker-slot .remove-x {
    position: absolute;
    top: -2px;
    right: 2px;
    color: var(--seal);
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    line-height: 1;
    background: var(--paper);
    border-radius: 50%;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Quiz area */
.quiz-area {
    padding: 20px 30px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
}
.quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    flex-wrap: wrap;
    gap: 8px;
}
.quiz-header .chapter {
    font-size: var(--fs-small);
    color: var(--seal);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.quiz-header .progress {
    font-size: var(--fs-small);
    color: var(--ink-soft);
}
.quiz-header .nav-btns {
    display: flex;
    gap: 6px;
}
.quiz-header .nav-btns button {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 2px 10px;
    cursor: pointer;
    font-size: var(--fs-small);
    font-family: Georgia, serif;
    color: var(--ink);
}
.quiz-header .nav-btns button:disabled {
    opacity: 0.4;
    cursor: default;
}
.quiz-header .nav-btns button:hover:not(:disabled) {
    background: var(--paper);
}
.bookmark-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: var(--fs-h2);
    color: var(--ink-soft);
    opacity: 0.5;
}
.bookmark-btn.active { color: var(--gold); opacity: 1; }

.question-text {
    font-size: var(--fs-body);
    margin: 16px 0;
    line-height: 1.7;
}
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.option {
    padding: 12px 16px;
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    font-size: var(--fs-body);
    font-family: Georgia, serif;
    color: var(--ink);
    text-align: left;
    transition: all 0.2s;
}
.option:hover { border-color: var(--gold); background: var(--paper-2); }
.option.selected {
    border-color: var(--gold);
    background: var(--paper-2);
}
.option.correct {
    border-color: var(--ok);
    background: #d4edda;
}
.option.wrong {
    border-color: var(--seal);
    background: #f8d7da;
}
.option.previous-wrong {
    border-color: #d0a8a8;
    background: #fbeeee;
    color: #8a5555;
}
.option.disabled { cursor: default; }

.answer-status {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: var(--fs-small);
    margin-bottom: 12px;
    border: 1px solid;
}
.answer-status.good {
    background: #e8f5e9;
    border-color: var(--ok);
    color: #2e6b32;
}
.answer-status.bad {
    background: #fdf2f2;
    border-color: var(--seal);
    color: #8a2828;
}
.feedback.hint {
    background: var(--paper-2);
    border: 1px dashed var(--ink-soft);
    color: var(--ink-soft);
    display: block;
}

.feedback {
    margin: 16px 0;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: var(--fs-body);
    display: none;
}
.feedback.show { display: block; }
.feedback.correct {
    background: #d4edda;
    border: 1px solid var(--ok);
    color: var(--ok);
}
.feedback.wrong {
    background: #f8d7da;
    border: 1px solid var(--seal);
    color: var(--seal);
}
.feedback .principle {
    margin-top: 8px;
    font-size: var(--fs-body);
    color: var(--ink);
}
.feedback .principle-cn {
    margin-top: 6px;
    font-size: var(--fs-small);
    color: var(--ink-soft);
}
.feedback .cite {
    margin-top: 6px;
    font-size: var(--fs-small);
    color: var(--ink-soft);
    font-style: italic;
}

.next-btn {
    background: var(--seal);
    color: var(--paper);
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: var(--fs-body);
    font-family: Georgia, serif;
    cursor: pointer;
    display: none;
}
.next-btn.show { display: inline-block; }
.next-btn:hover { background: #6b1414; }

.review-btn {
    background: var(--gold);
    color: var(--paper);
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: var(--fs-small);
    font-family: Georgia, serif;
    cursor: pointer;
    margin-left: 10px;
}
.review-btn:hover { background: var(--gold-light); }

/* Shop modal */
.shop-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
}
.shop-overlay.show { display: flex; }
.shop-modal {
    background: var(--paper);
    border-radius: 12px;
    padding: 20px;
    max-width: 700px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    border: 2px solid var(--gold);
}
.shop-modal h2 {
    font-size: var(--fs-h1);
    color: var(--ink);
    margin-bottom: 4px;
    text-align: center;
}
.shop-modal .shop-coins {
    text-align: center;
    font-size: var(--fs-body);
    color: var(--gold);
    font-weight: bold;
    margin-bottom: 16px;
}
.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
}
.shop-item {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
}
.shop-item:hover { border-color: var(--gold); }
.shop-item.owned { opacity: 0.5; cursor: default; }
.shop-item.owned::after {
    content: '✓ Owned';
    display: block;
    font-size: var(--fs-small);
    color: var(--ok);
    margin-top: 4px;
}
.shop-item .icon { font-size: 36px; }
.shop-item .name { font-size: var(--fs-small); color: var(--ink); margin-top: 4px; }
.shop-item .price { font-size: var(--fs-small); color: var(--gold); font-weight: bold; margin-top: 4px; }
.shop-item button {
    background: var(--seal);
    color: var(--paper);
    border: none;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: var(--fs-small);
    font-family: Georgia, serif;
    margin-top: 6px;
}
.shop-item button:disabled { background: var(--ink-soft); cursor: default; }
.shop-close {
    display: block;
    margin: 16px auto 0;
    background: var(--ink-soft);
    color: var(--paper);
    border: none;
    padding: 8px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: var(--fs-body);
    font-family: Georgia, serif;
}

/* Placement mode */
.placement-banner {
    display: none;
    background: var(--gold);
    color: var(--paper);
    padding: 8px 20px;
    text-align: center;
    font-size: var(--fs-body);
    font-weight: bold;
}
.placement-banner.show { display: block; }
.placement-banner .cancel-btn {
    background: var(--paper);
    color: var(--gold);
    border: none;
    padding: 2px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: var(--fs-small);
    font-family: Georgia, serif;
    margin-left: 12px;
}

/* Mobile */
@media (max-width: 768px) {
    .main {
        grid-template-columns: 80px 1fr 80px;
    }
    .sticker-col {
        width: 80px;
        padding: 4px 3px;
    }
    .sticker-col .sticker-grid {
        gap: 3px;
    }
    .sticker-slot {
        font-size: 18px;
    }
    .sticker-slot .empty-hint {
        font-size: var(--fs-small);
    }
    .quiz-area {
        padding: 12px 8px;
    }
    .topbar {
        padding: 8px 10px;
    }
    .topbar .title {
        font-size: var(--fs-h2);
    }
    .shop-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="title">⚖ SQE · Contract Law</div>
  <div class="stars" id="stars-top"></div>
  <div class="right">
    <div class="coins">💰 <span class="val" id="coins">0</span></div>
    <button class="fs-btn" onclick="changeFS(-1)">A-</button>
    <button class="fs-btn" onclick="changeFS(1)">A+</button>
  </div>
</div>

<div class="placement-banner" id="placement-banner">
  Tap a slot to place your sticker!
  <button class="cancel-btn" onclick="cancelPlacement()">Cancel</button>
</div>

<div class="main">
  <div class="sticker-col col-left" id="col-left">
    <div class="col-label">Left</div>
  </div>

  <div class="quiz-area">
    <div class="quiz-header">
      <div>
        <span class="chapter" id="chapter"></span>
        <span class="progress" id="progress" style="margin-left:12px;"></span>
      </div>
      <div class="nav-btns">
        <button id="prev-btn" onclick="prevQuestion()">← Prev</button>
        <button id="review-btn" class="review-btn" onclick="startReview()" style="display:none;">Review Wrong</button>
        <button id="next-nav-btn" onclick="nextQuestion()">Next →</button>
        <button class="bookmark-btn" id="bookmark-btn" onclick="toggleBookmark()">☆</button>
      </div>
    </div>
    <div class="stars" id="stars-quiz" style="justify-content:center; margin: 4px 0;"></div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
  </div>

  <div class="sticker-col col-right" id="col-right">
    <div class="col-label">Right</div>
  </div>
</div>

<!-- Shop -->
<div class="shop-overlay" id="shop-overlay">
  <div class="shop-modal">
    <h2>🏷️ Sticker Shop</h2>
    <div class="shop-coins">💰 Coins: <span id="shop-coins">0</span></div>
    <div class="shop-grid" id="shop-grid"></div>
    <button class="shop-close" onclick="closeShop()">Close</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'sqe-l8-stickers-v2';
const SLOTS_PER_COL = 10;

const DEFAULT_STATE = {
  coins: 0,
  qIndex: 0,
  answered: [],
  wrong: {},
  bookmarked: [],
  stickers: {},
  placementItem: null,
  fsLevel: 0,
  reviewMode: false,
  reviewQueue: [],
  lastAnsweredKey: null,
  lastAnsweredCorrect: null
};

const STICKERS = [
  { id: 'daisy',       name: 'Daisy',           icon: '🌼', price: 50 },
  { id: 'tulip',       name: 'Tulip',           icon: '🌷', price: 50 },
  { id: 'rose',        name: 'Rose',            icon: '🌹', price: 80 },
  { id: 'sunflower',   name: 'Sunflower',       icon: '🌻', price: 80 },
  { id: 'clover',      name: 'Clover',          icon: '🍀', price: 100 },
  { id: 'cactus',      name: 'Cactus',          icon: '🌵', price: 120 },
  { id: 'palm',        name: 'Palm',            icon: '🌴', price: 150 },
  { id: 'fir',         name: 'Fir Tree',        icon: '🌲', price: 150 },
  { id: 'book',        name: 'Law Book',        icon: '📕', price: 100 },
  { id: 'scroll',      name: 'Scroll',          icon: '📜', price: 120 },
  { id: 'trophy',      name: 'Trophy',          icon: '🏆', price: 200 },
  { id: 'medal',       name: 'Medal',           icon: '🎖', price: 200 },
  { id: 'ribbon',      name: 'Ribbon',          icon: '🎗', price: 150 },
  { id: 'star',        name: 'Star',            icon: '⭐', price: 100 },
  { id: 'gem',         name: 'Gem',             icon: '💎', price: 300 },
  { id: 'crown',       name: 'Crown',           icon: '👑', price: 500 },
  { id: 'anchor',      name: 'Anchor',          icon: '⚓', price: 250 },
  { id: 'key',         name: 'Key',             icon: '🔑', price: 180 },
  { id: 'balance',     name: 'Scales',          icon: '⚖', price: 350 },
  { id: 'gavel',       name: 'Gavel',           icon: '🔨', price: 400 }
];

const QUESTIONS = [
  {
    "key": "c1",
    "chapter": "1 · Offer vs ITT",
    "text": "A man places an advertisement in a local newspaper: 'Digital camera. Bought for £500, but may sell for £100. Contact me at the following address if you wish to buy.' A woman sees the advertisement and posts a letter saying she will buy the camera for £100. The man replies that the camera has already been sold. The woman claims there is a binding contract. What is the correct analysis?",
    "options": [
      "The advertisement is an invitation to treat, not an offer — words like 'may sell' and 'contact me if you wish to buy' show no intention to be bound. The woman's letter was an offer that the man rejected.",
      "The advertisement is a unilateral offer that the woman accepted by posting her letter.",
      "The advertisement is a bilateral offer that the woman accepted by post under the postal rule.",
      "The advertisement is an offer because it states a specific price (£100) for a specific item.",
      "The advertisement is merely a promotional statement and has no legal effect whatsoever."
    ],
    "best": 0,
    "principle": "Advertisements are generally invitations to treat, not offers. The wording 'may sell' and 'contact me if you wish to buy' is not conducive with contractual intent. If it were an offer, there would be a problem of multi-acceptance (only one camera but potentially unlimited acceptances).",
    "cite": "Revise SQE Contract Law, Ch 1; FLK1 Practice 180 Q",
    "principleCN": "广告通常是要约邀请，不是要约。'may sell'和'contact me if you wish to buy'的措辞不表明受法律约束的意图。如果要约的话还会产生多人接受的问题。",
    "citeCN": "Revise SQE 合同法, 第1章; FLK1 练习题"
  },
  {
    "key": "c2",
    "chapter": "1 · Offer vs ITT",
    "text": "A shop displays goods on its shelves with price tags. A customer picks up an item and takes it to the till. At what point is the offer made?",
    "options": [
      "The display of goods is an invitation to treat; the customer makes the offer by taking the item to the till; the shop accepts by processing the sale.",
      "The shop makes the offer when it puts the price tag on the item.",
      "The display of goods is an offer; the customer accepts by picking up the item from the shelf.",
      "The display is neither an offer nor an invitation to treat — it is merely decorative."
    ],
    "best": 0,
    "principle": "Display of goods in a shop is an invitation to treat (Pharmaceutical Society v Boots [1953]). The customer makes the offer at the till, and the shopkeeper accepts or refuses. This protects the shopkeeper from being forced to sell to everyone.",
    "cite": "Pharmaceutical Society of Great Britain v Boots Cash Chemists [1953] 1 QB 401",
    "principleCN": "商店货架上的商品展示是要约邀请（Boots 案 [1953]）。顾客在收银台提出要约，店主决定接受或拒绝。这保护店主不被强制向所有人出售。",
    "citeCN": "Pharmaceutical Society v Boots [1953] 1 QB 401"
  },
  {
    "key": "c3",
    "chapter": "1 · Offer vs ITT",
    "text": "Which of the following is correctly classified as an OFFER (not an invitation to treat)?",
    "options": [
      "A shop display of goods on shelves with price tags.",
      "A general advertisement in a newspaper announcing a product and its price.",
      "An auction 'without reserve' — the auctioneer makes a unilateral offer to sell to the highest bidder.",
      "A request for tenders where the requester asks companies to submit quotes."
    ],
    "best": 2,
    "principle": "An auction 'without reserve' is a unilateral offer — a promise to sell to the highest bidder (Barry v Davies [2000]). This is an exception to the general rule that auction requests for bids are invitations to treat.",
    "cite": "Barry v Davies [2000] 1 WLR 1962",
    "principleCN": "\"无保留\"拍卖是一项单方要约——向最高出价者出售的承诺（Barry v Davies [2000]）。这是一般规则的例外。",
    "citeCN": "Barry v Davies [2000] 1 WLR 1962"
  },
  {
    "key": "c4",
    "chapter": "1 · Offer vs ITT",
    "text": "A company sets up a website where customers can browse products and click 'Buy Now' to place orders. The company then processes the order and ships the goods. What is the legal classification of the website?",
    "options": [
      "The website is an invitation to treat — the customer's order is the offer, and the company accepts by confirming/shipping the order.",
      "The website is a bilateral offer that the customer accepts by clicking 'Buy Now'.",
      "The website has no legal significance — it is merely advertising.",
      "The website is a unilateral offer that the customer accepts by clicking 'Buy Now'."
    ],
    "best": 0,
    "principle": "Generally, a website through which goods can be bought is an invitation to treat. The order made by the person wishing to buy is the offer. The seller can accept or reject the order. This protects the seller from being bound to sell goods that may be out of stock.",
    "cite": "Revise SQE Contract Law, Ch 1",
    "principleCN": "一般来说，可通过其购买商品的网站是要约邀请。买方的订单才是要约，卖方可以接受或拒绝。这保护卖方不必在缺货时仍被约束出售。",
    "citeCN": "Revise SQE 合同法, 第1章"
  },
  {
    "key": "c5",
    "chapter": "1 · Offer vs ITT",
    "text": "A council sends a letter to a tenant with an agreement form for the purchase of their council house. The letter says: 'If you wish to buy, please sign and return this agreement.' The tenant signs and returns it. Was the council's letter an offer?",
    "options": [
      "No — council communications are always invitations to treat, never offers.",
      "Yes — but only because the council is a public body and cannot make invitations to treat.",
      "Yes — the language was certain and showed a clear intention to be bound if the tenant signed and returned it. This was an offer, not an invitation to treat (Storer v Manchester CC).",
      "No — the letter was merely an invitation to treat, and the tenant's signature was an offer that the council could accept or reject."
    ],
    "best": 2,

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), saved);
    }
  } catch(e) { console.warn('Load failed:', e); }
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.warn('Save failed:', e); }
}

function applyFS() {
  document.body.classList.remove('fs-lg', 'fs-xl');
  if (state.fsLevel === 1) document.body.classList.add('fs-lg');
  else if (state.fsLevel === 2) document.body.classList.add('fs-xl');
}

function changeFS(dir) {
  state.fsLevel = Math.max(0, Math.min(2, state.fsLevel + dir));
  applyFS();
  save();
}

function renderCoins() {
  document.getElementById('coins').textContent = state.coins;
}

function renderStars() {
  const count = Object.keys(state.stickers).filter(id => {
    const s = state.stickers[id];
    return s.side !== null && s.slot >= 0;
  }).length;
  const filled = Math.floor(count / 4);
  const html = Array.from({length: 5}, (_, i) =>
    `<span class="star ${i < filled ? 'filled' : ''}">${i < filled ? '★' : '☆'}</span>`
  ).join('');
  const top = document.getElementById('stars-top');
  const quiz = document.getElementById('stars-quiz');
  if (top) top.innerHTML = html;
  if (quiz) quiz.innerHTML = html;
}

function getCurrentQuestions() {
  if (state.reviewMode && state.reviewQueue.length > 0) {
    return state.reviewQueue;
  }
  return QUESTIONS;
}

function renderQuestion() {
  const qs = getCurrentQuestions();
  const idx = state.qIndex;
  const q = qs[idx];

  document.getElementById('chapter').textContent = q.chapter;
  document.getElementById('progress').textContent = `Question ${idx + 1} / ${qs.length}`;
  document.getElementById('question-text').textContent = q.text;

  const optsDiv = document.getElementById('options');
  optsDiv.innerHTML = '';
  const answered = state.answered.includes(q.key);
  const isCorrectSoFar = answered && state.wrong[q.key] === undefined;
  if (answered) {
    const status = document.createElement('div');
    status.className = 'answer-status ' + (isCorrectSoFar ? 'good' : 'bad');
    status.textContent = isCorrectSoFar
      ? '✓ Last answer: Correct. You can re-answer below to confirm or change your mind.'
      : '✗ Currently in your review list. Re-answer to remove it from review or change your choice.';
    optsDiv.appendChild(status);
  }
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    if (answered && state.wrong[q.key] === i) {
      btn.classList.add('previous-wrong');
    }
    btn.onclick = () => selectOption(i);
    optsDiv.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');
  const justAnswered = state.lastAnsweredKey === q.key;
  if (justAnswered) {
    const correct = state.lastAnsweredCorrect;
    fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
    let html = correct ? '✅ Correct!' : '❌ Not quite.';
    html += `<div class="principle"><strong>Principle:</strong> ${q.principle}</div>`;
    html += `<div class="principle-cn">${q.principleCN}</div>`;
    html += `<div class="cite">📚 ${q.cite}</div>`;
    html += `<div class="cite">${q.citeCN}</div>`;
    fb.innerHTML = html;
    nextBtn.classList.add('show');
    nextBtn.textContent = idx + 1 < qs.length ? 'Next →' : 'Finish';
  } else if (answered) {
    fb.className = 'feedback show hint';
    fb.innerHTML = '<em>Pick an option above to re-answer. The correct answer and principle will be shown after you click.</em>';
    nextBtn.classList.remove('show');
  } else {
    fb.className = 'feedback';
    fb.innerHTML = '';
    nextBtn.classList.remove('show');
  }

  // Bookmark
  const bmBtn = document.getElementById('bookmark-btn');
  if (state.bookmarked.includes(q.key)) {
    bmBtn.classList.add('active');
    bmBtn.textContent = '★';
  } else {
    bmBtn.classList.remove('active');
    bmBtn.textContent = '☆';
  }

  // Nav buttons
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-nav-btn').disabled = idx === qs.length - 1;

  renderReviewBtn();
}

function toggleBookmark() {
  const q = getCurrentQuestions()[state.qIndex];
  const i = state.bookmarked.indexOf(q.key);
  if (i >= 0) state.bookmarked.splice(i, 1);
  else state.bookmarked.push(q.key);
  save();
  renderQuestion();
}

function selectOption(i) {
  const q = getCurrentQuestions()[state.qIndex];
  const wasAnswered = state.answered.includes(q.key);
  const wasWrong = state.wrong[q.key] !== undefined;
  const isCorrect = i === q.best;

  if (wasAnswered) {
    if (wasWrong) {
      delete state.wrong[q.key];
    }
    if (isCorrect && wasWrong) {
      state.coins += 20;
      renderCoins();
    }
  } else {
    state.answered.push(q.key);
    if (isCorrect) {
      state.coins += 20;
      renderCoins();
    }
  }

  if (!isCorrect) {
    state.wrong[q.key] = i;
  }
  state.lastAnsweredKey = q.key;
  state.lastAnsweredCorrect = isCorrect;
  save();
  renderQuestion();
}

function nextQuestion() {
  const qs = getCurrentQuestions();
  if (state.qIndex < qs.length - 1) {
    state.qIndex++;
    state.lastAnsweredKey = null;
    state.lastAnsweredCorrect = null;
    save();
    renderQuestion();
  } else {
    if (state.reviewMode) {
      exitReviewMode();
    } else {
      state.qIndex = 0;
      state.lastAnsweredKey = null;
      state.lastAnsweredCorrect = null;
      save();
      renderQuestion();
    }
  }
}

function prevQuestion() {
  if (state.qIndex > 0) {
    state.qIndex--;
    state.lastAnsweredKey = null;
    state.lastAnsweredCorrect = null;
    save();
    renderQuestion();
  }
}

function getReviewQuestions() {
  return QUESTIONS.filter(q => state.wrong[q.key] !== undefined);
}

function renderReviewBtn() {
  const reviewBtn = document.getElementById('review-btn');
  const wrongQs = getReviewQuestions();
  if (wrongQs.length > 0 && !state.reviewMode) {
    reviewBtn.style.display = '';
    reviewBtn.textContent = `Review Wrong (${wrongQs.length})`;
  } else {
    reviewBtn.style.display = 'none';
  }
}

function startReview() {
  const wrongQs = getReviewQuestions();
  if (wrongQs.length === 0) return;
  state.reviewMode = true;
  state.reviewQueue = wrongQs;
  state.qIndex = 0;
  save();
  renderQuestion();
}

function exitReviewMode() {
  state.reviewMode = false;
  state.reviewQueue = [];
  state.qIndex = 0;
  save();
  renderQuestion();
}

function renderStickers() {
  ['left', 'right'].forEach(side => {
    const col = document.getElementById('col-' + side);
    const label = col.querySelector('.col-label');
    col.innerHTML = '';
    col.appendChild(label);
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid; grid-template-columns: 1fr; gap: 6px;';
    for (let i = 0; i < SLOTS_PER_COL; i++) {
      const slot = document.createElement('div');
      slot.className = 'sticker-slot';
      let placedItem = null;
      for (const [id, data] of Object.entries(state.stickers)) {
        if (data.side === side && data.slot === i) {
          placedItem = STICKERS.find(s => s.id === id);
          break;
        }
      }
      if (placedItem) {
        slot.classList.add('filled');
        slot.innerHTML = placedItem.icon;
        const x = document.createElement('div');
        x.className = 'remove-x';
        x.textContent = '×';
        x.onclick = (e) => { e.stopPropagation(); removeSticker(placedItem.id); };
        slot.appendChild(x);
      } else {
        slot.innerHTML = '<span class="empty-hint">+</span>';
      }
      slot.onclick = () => placeSticker(side, i);
      grid.appendChild(slot);
    }
    col.appendChild(grid);
  });
  renderStars();
}

function removeSticker(id) {
  state.stickers[id] = { side: null, slot: -1 };
  save();
  renderStickers();
}

function placeSticker(side, slot) {
  if (!state.placementItem) return;
  // If target slot has a sticker, kick it back to stash
  for (const [id, data] of Object.entries(state.stickers)) {
    if (data.side === side && data.slot === slot && id !== state.placementItem) {
      state.stickers[id] = { side: null, slot: -1 };
      break;
    }
  }
  // Place the new sticker
  state.stickers[state.placementItem] = { side: side, slot: slot };
  state.placementItem = null;
  document.getElementById('placement-banner').classList.remove('show');
  save();
  renderStickers();
}

function cancelPlacement() {
  state.placementItem = null;
  document.getElementById('placement-banner').classList.remove('show');
  save();
}

function openShop() {
  document.getElementById('shop-coins').textContent = state.coins;
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  STICKERS.forEach(s => {
    const item = document.createElement('div');
    item.className = 'shop-item';
    const owned = state.stickers[s.id] !== undefined;
    const placed = owned && state.stickers[s.id].side !== null && state.stickers[s.id].slot >= 0;
    if (owned) item.classList.add('owned');
    item.innerHTML = `
      <div class="icon">${s.icon}</div>
      <div class="name">${s.name}</div>
      <div class="price">💰 ${s.price}</div>
    `;
    if (!owned) {
      const btn = document.createElement('button');
      btn.textContent = 'Buy';
      btn.disabled = state.coins < s.price;
      btn.onclick = () => buySticker(s.id);
      item.appendChild(btn);
    } else if (!placed) {
      const btn = document.createElement('button');
      btn.textContent = 'Stick';
      btn.onclick = () => startPlacement(s.id);
      item.appendChild(btn);
    } // placed items show no button
  });
  document.getElementById('shop-overlay').classList.add('show');
}

function closeShop() {
  document.getElementById('shop-overlay').classList.remove('show');
}

function buySticker(id) {
  const s = STICKERS.find(x => x.id === id);
  if (!s) return;
  if (state.coins < s.price) return;
  state.coins -= s.price;
  state.stickers[id] = { side: null, slot: -1 };
  save();
  renderCoins();
  openShop(); // refresh shop
  startPlacement(id);
}

function startPlacement(id) {
  state.placementItem = id;
  document.getElementById('placement-banner').classList.add('show');
  closeShop();
}

function init() {
  load();
  applyFS();
  renderCoins();
  renderStickers();
  renderStars();
  renderQuestion();

  // Add shop access via keyboard shortcut or double-click on sticker area
  document.addEventListener('keydown', (e) => {
    if (e.key === 's' && e.shiftKey) {
      e.preventDefault();
      openShop();
    }
  });

  // Add a shop button to the topbar area — append to right section
  const rightDiv = document.querySelector('.topbar .right');
  if (rightDiv) {
    const shopBtn = document.createElement('button');
    shopBtn.className = 'fs-btn';
    shopBtn.textContent = '🏷️';
    shopBtn.style.marginRight = '4px';
    shopBtn.onclick = openShop;
    rightDiv.insertBefore(shopBtn, rightDiv.firstChild);
  }
}

init();
</script>
</body>
</html>
