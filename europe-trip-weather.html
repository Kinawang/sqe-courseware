<style>

  .header {

    padding: 4px 14px;
    font-size: 12px;
    margin-top: 8px;
  }

  .summary-strip {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #e0e6ed;
    scrollbar-width: none;
  }
  .summary-strip::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 16px;
    border: 1.5px solid #d0d9e4;
    background: white;
    color: #555;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-btn:hover { border-color: #4a6fa5; color: #4a6fa5; }
  .day-btn.active {
    background: #2E4057;
    border-color: #2E4057;
    color: white;
  }
  .day-btn .temp { font-size: 11px; opacity: 0.8; margin-top: 1px; }

  .main-card {
    max-width: 680px;
    margin: 16px auto;
    padding: 0 16px 40px;
  }

  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    overflow: hidden;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .card.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-head {
    padding: 18px 20px 14px;
    border-bottom: 1px solid #f0f4f8;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-head .day-tag {
    background: #2E4057;
    color: white;
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 700;
  }
  .card-head .route { font-size: 14px; color: #555; flex: 1; }
  .card-head .temp-big {
    font-size: 28px;
    font-weight: 700;
    color: #2E4057;
    text-align: right;
  }
  .card-head .temp-big span { font-size: 14px; font-weight: 400; color: #888; margin-left: 2px; }

  .weather-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: #f0f4f8;
    margin: 0;
  }
  .wg-item {
    background: white;
    padding: 14px 16px;
  }
  .wg-item .label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .wg-item .value { font-size: 14px; color: #333; line-height: 1.5; }
  .wg-item .value.hot { color: #e74c3c; }
  .wg-item .value.cool { color: #2980b9; }
  .wg-item .value.warn { color: #e67e22; font-weight: 600; }
  .wg-item.full { grid-column: 1 / -1; }

  .icon-row {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    font-size: 13px;
  }
  .icon-chip {
    background: #eaf2f8;
    color: #2980b9;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
  }

    background: #fdf8ff;

  }
  .clothes-section .sec-title {

    color: #9b59b6;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .clothes-section .sec-title::before { content: '👗'; }
  .clothes-section p { font-size: 14px; color: #6c3483; line-height: 1.7; }

  .tips-section {
    background: #f0faf0;
    border-top: 1px solid #e8f5e9;
    padding: 14px 20px 16px;
  }

    color: #27ae60;
    font-weight: 600;
    margin-bottom: 8px;

    align-items: center;
    gap: 6px;

  .tips-section li {
    font-size: 13px;
    color: #2e7d32;
    padding: 5px 0;

    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;

  .tips-section li::before { content: '•'; color: #27ae60; font-weight: bold; flex-shrink: 0; margin-top: 1px; }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid #e0e6ed;
    display: flex;
    justify-content: space-around;

    z-index: 100;

  .bn-btn {
    background: #2E4057;
    color: white;
    border: none;
    border-radius: 24px;
    padding: 10px 28px;
    font-size: 15px;
    font-weight: 600;

  }
  .bn-btn:hover { background: #1a3350; }

  .weather-icon {
    font-size: 28px;
    text-align: center;
    padding: 16px 0 4px;
  }

  .rain-bar {
    height: 6px;
    background: #e0e6ed;
    border-radius: 3px;
    margin-top: 6px;
    overflow: hidden;
  }
  .rain-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #27ae60, #f39c12, #e74c3c);
    transition: width 0.5s ease;

    background: #fff3cd;
    border-left: 4px solid #e67e22;
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    margin: 0 20px 16px;
    font-size: 13px;
    color: #856404;
    line-height: 1.6;
  }
  .alert-box strong { color: #d35400; }

  .page-footer {
    text-align: center;
    padding: 24px 16px 120px;
    color: #aaa;
    font-size: 12px;
  }

  .hot-cold-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }

    display: flex;
    gap: 2px;
    align-items: center;
  }
  .scale-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ddd;
  }
  .scale-dot.filled { background: #e74c3c; }
  .scale-dot.cool { background: #2980b9; }

  @media (min-width: 600px) {

</style>

let current = 0;

function renderStrip() {
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = days.map((d, i) => {
    const isActive = i === current;
    return `<button class="day-btn${isActive ? ' active' : ''}" onclick="showDay(${i})">
      <div>${d.day}</div>
      <div class="temp">${d.temp}</div>
    </button>`;
  }).join('');
}

function getRainColor(pct) {
  if (pct <= 10) return '#27ae60';
  if (pct <= 25) return '#f39c12';
  return '#e74c3c';
}

function showDay(idx) {
  current = idx;
  const d = days[idx];
  const card = document.getElementById('mainCard');

  const rainColor = getRainColor(d.rainPct);
  const rainWidth = Math.min(d.rainPct, 60) + '%';

  card.innerHTML = `
    <div class="card show">
      <div class="weather-icon">${d.icon}</div>
      <div class="card-head">
        <div class="day-tag">${d.day}</div>
        <div class="route">${d.date}<br><small style="color:#888">${d.route}</small></div>
        <div class="temp-big">${d.temp.split('~')[0]}<span>~${d.temp.split('~')[1]}</span></div>
      </div>

      <div class="weather-grid">
        <div class="wg-item full">
          <div class="label">天气状况</div>
          <div class="value">${d.weather}</div>
        </div>
        <div class="wg-item">
          <div class="label">最高温时段</div>
          <div class="value hot">${d.high}</div>
        </div>
        <div class="wg-item">
          <div class="label">最低温时段</div>
          <div class="value cool">${d.low}</div>
        </div>
        <div class="wg-item full">
          <div class="label">降雨概率</div>
          <div class="value">${d.rain}</div>
          <div class="rain-bar">
            <div class="rain-fill" style="width:${rainWidth}; background:${rainColor}"></div>
          </div>
        </div>
        <div class="wg-item full">
          <div class="label">日照</div>
          <div class="value">${d.sun}</div>
        </div>
        <div class="wg-item full" style="background:#fff8e1;">
          <div class="label">景点体感温度</div>
          <div class="value" style="color:#b45309;">${d.spot}</div>
        </div>
      </div>

      <div class="alert-box"><strong>${d.alert}</strong></div>

      <div class="clothes-section">
        <div class="sec-title">穿搭建议</div>
        <p>${d.clothes}</p>
      </div>

      <div class="tips-section">
        <div class="sec-title">贴心小贴士</div>
        <ul>
          ${d.tips.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>
    </div>
  `;

  renderStrip();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('prevBtn').addEventListener('click', () => {
  if (current > 0) showDay(current - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (current < days.length - 1) showDay(current + 1);
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && current > 0) showDay(current - 1);
  if (e.key === 'ArrowRight' && current < days.length - 1) showDay(current + 1);
});

// Init
showDay(0);
</script>
